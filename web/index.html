<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Iron Man MK-II Flight Simulation — Game interaktif berbasis HTML5 Canvas dengan sistem musuh, skor, dan efek visual premium.">
    <meta name="theme-color" content="#0a0a14">
    <title>Iron Man MK-II: Flight Simulation</title>

    <!-- Preload font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Stylesheet -->
    <link rel="stylesheet" href="css/style.css">

    <!-- Favicon (Iron Man helmet emoji) -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🦾</text></svg>">
</head>
<body>
    <!-- Game Canvas -->
    <canvas id="gameCanvas"></canvas>

    <!-- HUD Overlay -->
    <div id="hud">
        <div class="glass-panel" id="panel-score">
            <span class="label">Score</span>
            <span class="value" id="score-value">0</span>
        </div>
        <div class="glass-panel" id="panel-wave">
            <span class="label">Wave</span>
            <span class="value" id="wave-value">-</span>
        </div>
        <div class="glass-panel" id="panel-high">
            <span class="label">High Score</span>
            <span class="value" id="high-value">0</span>
        </div>
    </div>

    <!-- Combo Display -->
    <div id="combo-value"></div>

    <!-- Health Bar -->
    <div id="health-bar-container">
        <div id="health-bar-wrapper">
            <div class="hp-label-row">
                <span class="hp-label">Shield</span>
                <span id="hp-text">100</span>
            </div>
            <div id="hp-bar-track">
                <div id="hp-fill"></div>
            </div>
        </div>
    </div>

    <!-- Scripts (loaded in dependency order) -->
    <script src="js/utils.js"></script>
    <script src="js/input.js"></script>
    <script src="js/effects.js"></script>
    <script src="js/player.js"></script>
    <script src="js/enemy.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
